<script>

setInterval(()=>{

let num=parseInt(el.innerText)
let change=Math.floor(Math.random()*6)-2

num=num+change

if(num<32) num=32
if(num>95) num=95

el.innerText=num

},4000)

let el=document.getElementById("spots")

const commentsData=[

/* GERAR MAIS COMENTÁRIOS */

const names=["Aline","Fernanda","Luciana","Tatiane","Paula","Gabriela","Renata","Bianca"]

"Funciona mesmo pra quem nunca treinou?",
"Dá pra fazer sem academia?",
"Meu problema é barriga… será que ajuda?",
"Precisa de peso ou só corpo?",
"Vi no Instagram e vim ver se é bom",
"Parece fácil de seguir"
]

for(let i=0;i<70;i++){

commentsData.push({
name:names[Math.floor(Math.random()*names.length)]+" "+["Silva","Souza","Costa"][Math.floor(Math.random()*3)],
avatar:"https://randomuser.me/api/portraits/women/"+Math.floor(Math.random()*90)+".jpg",

time:Math.floor(Math.random()*59)+" min",
likes:Math.floor(Math.random()*30),
replies:[]
})

}

let visibleComments=5

function renderComments(){

const container=document.getElementById("comments-container")
if(!container) return

container.innerHTML=""

commentsData.slice(0,visibleComments).forEach(c=>{

container.innerHTML+=`

<div style="margin-bottom:15px;">

<img src="${c.avatar}" width="35" style="border-radius:50%;vertical-align:top">

<div style="display:inline-block;background:#f0f2f5;padding:10px 14px;border-radius:18px;max-width:80%;">

<strong>${c.name}</strong>
<div>${c.text}</div>

</div>

<div style="font-size:12px;color:#65676b;margin-left:45px;">
Curtir · Responder · ${c.time} · ❤️ ${c.likes}
</div>

</div>

`

})

}

document.getElementById("loadMoreBtn").onclick=function(){
visibleComments+=5
renderComments()
}

</script>
